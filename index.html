<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/CSS/style.css" />

    <title>User Dashboard</title>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-6 offset-md-3 shadow">
          <div class="card">
            <div class="card-header">
              <div class="card-header bg-primary text-white">
                <h4 class="mb-0 text-center">
                  <i class="fas fa-user-plus"></i>
                  Add New User
                </h4>
              </div>
            </div>
            <div class="card-body">
              <form action="" id="userForm">
                <div class="form-group">
                  <input
                    type="text"
                    id="name"
                    class="form-control"
                    placeholder="Enter Name"
                  />
                </div>

                <div class="form-group">
                  <input
                    type="text"
                    id="username"
                    class="form-control"
                    placeholder="Enter User Name"
                  />
                </div>

                <div class="form-group">
                  <input
                    type="text"
                    id="email"
                    class="form-control"
                    placeholder="Enter Email"
                  />
                </div>

                <div class="form-group">
                  <input
                    type="text"
                    id="address"
                    class="form-control"
                    placeholder="Enter Address"
                  />
                  </div>
            <div class="form-group">
                  <input
                    type="text"
                    id="phone"
                    class="form-control"
                    placeholder="Enter Phone"
                  />
                </div>
                  
                <button class="btn btn-primary btn-block" id="editBtn">Add User</button>
                <button type="button" class="btn btn-primary d-none btn-block" id="updateBtn">Update User</buttton>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-10 offset-md-1">
          <div class="table-responsive border rounded">
        <table class="  mt-2 table table-hover table-bordered align-middle text-center">
          <thead class="table-dark ">
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Username</th>
              <th>Email</th>
              <th>Address</th>
              <th>number</th>

              <th>Edit</th>
              <th>Delete</th>


            </tr>
          </thead>
          <tbody id="stdContainer">
            <!-- <tr>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>

            </tr> -->

           
          </tbody>
        </table>

        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/JS/app.js"></script>
  </body>
</html>
